<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 40" width="120" height="40">
  <defs>
    <linearGradient id="coinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#F0B90B;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d4a200;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <!-- Coin circle -->
  <circle cx="20" cy="20" r="17" fill="url(#coinGrad)" filter="url(#glow)"/>
  <circle cx="20" cy="20" r="14" fill="none" stroke="#7a5800" stroke-width="1" opacity="0.4"/>
  <!-- BB letters on coin -->
  <text x="20" y="25" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#000">BB</text>
  <!-- COIN text -->
  <text x="44" y="16" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#F0B90B" filter="url(#glow)">BB</text>
  <text x="44" y="32" font-family="Arial Black, sans-serif" font-size="10" font-weight="700" fill="#EAECEF" letter-spacing="2">COIN</text>
</svg>
